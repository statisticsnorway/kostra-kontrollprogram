micronaut:
  application:
    name: altinn-kontrollprogram-api

  http:
    client:
      read-timeout: 60s
      connect-timeout: 10s

  views:
    folder: static

  router:
    static-resources:
      default:
        enabled: true
        mapping: /**/*
        paths:
          - classpath:static

      swagger:
        paths: classpath:META-INF/swagger
        mapping: /swagger/**

  security:
    enabled: true

  server:
    multipart:
      max-file-size: 10485760 # 10 MiB
    netty:
      access-logger:
        enabled: true
        logger-name: HTTP_ACCESS_LOGGER
        log-format: '{"method":"%m","url":"%x","status":%s}'
        exclusions:
          - /health/.+
          - /health/
          - /health
          - /metrics
          - /prometheus
          - /docs/.+

endpoints:
  all:
    port: 8090
  environments:
    enabled: true
    sensitive: false
  health:
    sensitive: false
    details-visible: ANONYMOUS
    service-http-client:
      enabled: true
    monitor:
      enabled: true

logging:
  level:
    io.micronaut.security: WARN
    io.micronaut.security.token: WARN
    io.micronaut.security.token.jwt: WARN

api-keys:
  allowed: ${KOSTRA_KONTROLLPROGRAM_ALTINN_API_KEYS:}

api:
  title: "Altinn Kontrollprogram API"
  version: "1.0"
  description: "API for Kostra Kontrollprogram på Altinn"

