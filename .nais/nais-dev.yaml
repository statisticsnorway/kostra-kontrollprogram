apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  labels:
    team: kostra
  name: dev-kontrollprogram-{{pr}}
  namespace: kostra
spec:
  # application settings
  env:
    - name: MICRONAUT_ENVIRONMENTS
      value: nais-dev
  ingresses:
    - https://dev-kontrollprogram-{{pr}}.intern.test.ssb.no
  port: 8080
  replicas:
    max: 1
    min: 1
  resources:
    requests:
      cpu: 50m
      memory: 160Mi
  ttl: 2h
