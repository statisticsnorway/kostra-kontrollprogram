description: Filbeskrivelse for 11C Kvalifiseringsstønad
reportingYear: 2024
fieldDescriptions:
  - name: KOMMUNE_NR
    dataType: String
    length: 4
    from: 1
    to: 4
    description: Kommunenummer
    mandatory: true

  - name: VERSION
    dataType: String
    length: 2
    from: 5
    to: 6
    description: Oppgaveår
    mandatory: true

  - name: BYDELSNR
    dataType: String
    length: 2
    from: 7
    to: 8
    description: Bydelsnummer

  - name: DISTRIKTSNR
    dataType: String
    length: 2
    from: 9
    to: 10
    description: Distriktsnummer

  - name: PERSON_JOURNALNR
    dataType: String
    length: 8
    from: 11
    to: 18
    description: Journalnummer
    mandatory: true

  - name: PERSON_FODSELSNR
    dataType: String
    length: 11
    from: 19
    to: 29
    description: Hva er deltakerens fødselsnummer
    mandatory: true

  - name: KJONN
    dataType: String
    length: 1
    from: 30
    to: 30
    description: Hva er deltakerens kjønn?
    codeList:
      - code: 1
        description: Mann
      - code: 2
        description: Kvinne
    mandatory: true

  - name: EKTSTAT
    dataType: String
    length: 1
    from: 31
    to: 31
    description: Hva er deltakerens sivilstand/sivilstatus per kvartal?
    codeList:
      - code: 1
        description: Ugift
      - code: 2
        description: Gift
      - code: 3
        description: Samboer
      - code: 4
        description: Skilt/separert
      - code: 5
        description: Enke/enkemann

  - name: BU
    dataType: String
    length: 1
    from: 32
    to: 32
    description: Har deltakeren barn under 18 år som deltakeren (eventuelt ektefelle/samboer) har forsørgerplikt for og som bor i husholdningen?
    codeList:
      - code: 1
        description: Ja
      - code: 2
        description: Nei
    mandatory: true

  - name: ANTBU18
    dataType: Integer
    length: 2
    from: 33
    to: 34
    description: Hvis ja, hvor mange?

  - name: REG_DATO
    dataType: DATE
    datePattern: DDMMYY
    length: 6
    from: 35
    to: 40
    description: Hvilken dato ble søknaden registrert ved NAV-kontoret? DDMMÅÅ
    mandatory: true

  - name: VEDTAK_DATO
    dataType: DATE
    datePattern: DDMMYY
    length: 6
    from: 41
    to: 46
    description: Hvilken dato ble det fattet vedtak om program (søknad innvilget)? DDMMÅÅ
    mandatory: true

  - name: BEGYNT_DATO
    dataType: DATE
    datePattern: DDMMYY
    length: 6
    from: 47
    to: 52
    description: Hvilken dato begynte deltakeren i program (iverksettelse)? DDMMÅÅ
    mandatory: true

  - name: KVP_KOMM
    dataType: String
    length: 1
    from: 53
    to: 53
    description: Kommer deltakeren fra kvalifiseringsprogram i annen kommune?
    codeList:
      - code: 1
        description: Ja
      - code: 2
        description: Nei

  - name: KOMMNR_KVP_KOMM
    dataType: String
    length: 4
    from: 54
    to: 57
    description: Hvis ja, velg kommunenummer fra liste
# Legg til kodeliste over gyldig kommunenummer

  - name: YTELSE_SOSHJELP
    dataType: String
    length: 1
    from: 58
    to: 58
    description: Hadde deltakeren i løpet av de siste to månedene før registrert søknad ved NAV-kontoret en eller flere av følgende ytelser? Kan krysse av for flere svaralternativer)
    codeList:
      - code: 1
        description: Sosialhjelp

  - name: YTELSE_TYPE_SOSHJ
    dataType: String
    length: 1
    from: 59
    to: 59
    description: Hvis sosialhjelp, hvilken?
    codeList:
      - code: 2
        description: Sosialhjelp som viktigste kilde til livsopphold
      - code: 3
        description: Supplerende sosialhjelp

  - name: YTELSE_INTRO
    dataType: String
    length: 1
    from: 60
    to: 60
    description: Andre ytelser
    codeList:
      - code: 4
        description: Introduksjonsstønad

  - name: YTELSE_INDIVIDSTONAD
    dataType: String
    length: 1
    from: 61
    to: 61
    description: ""
    codeList:
      - code: 5
        description: Individstønad - stønad til livsopphold etter forskrift om arbeidsmarkedstiltak

  - name: YTELSE_FOLKETRYGDL
    dataType: String
    length: 1
    from: 62
    to: 62
    description: ""
    codeList:
      - code: 6
        description: Livsoppholdsytelse etter folketrygdloven - jf veiledningen

  - name: KVP_MED_ASTONAD
    dataType: String
    length: 1
    from: 63
    to: 63
    description: Har deltakeren i 2024 i løpet av perioden med kvalifiseringsstønad også mottatt økonomisk sosialhjelp, kommunal bostøtte eller Husbankens bostøtte?
    codeList:
      - code: 1
        description: Ja
      - code: 2
        description: Nei

  - name: KVP_MED_KOMMBOS
    dataType: String
    length: 1
    from: 64
    to: 64
    description: Hvis ja, hvilke? (kan krysse av for flere svaralternativer)
    codeList:
      - code: 4
        description: Kommunal bostøtte

  - name: KVP_MED_HUSBANKBOS
    dataType: String
    length: 1
    from: 65
    to: 65
    description: ""
    codeList:
      - code: 5
        description: Husbankens bostøtte

  - name: KVP_MED_SOSHJ_ENGANG
    dataType: String
    length: 1
    from: 66
    to: 66
    description: ""
    codeList:
      - code: 9
        description: Mottok økonomisk sosialhjelp som engangsstønad

  - name: KVP_MED_SOSHJ_PGM
    dataType: String
    length: 1
    from: 67
    to: 67
    description: ""
    codeList:
      - code: 8
        description: Mottok økonomisk sosialhjelp til dekking av særskilte utgifter knyttet til deltakelsen i programmet

  - name: KVP_MED_SOSHJ_SUP
    dataType: String
    length: 1
    from: 68
    to: 68
    description: ""
    codeList:
      - code: 7
        description: Mottok økonomisk sosialhjelp som fast supplement til dekking av løpende livsholdsutgifter

  - name: STMND_1
    dataType: String
    length: 2
    from: 69
    to: 70
    description: For hvilke måneder per kvartal i løpet av 2024 har deltakeren fått kvalifiseringsstønad?
    codeList:
      - code: 01
        description: Januar

  - name: STMND_2
