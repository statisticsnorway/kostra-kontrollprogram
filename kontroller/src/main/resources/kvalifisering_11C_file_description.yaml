  - name: KVP_STONAD
    dataType: Integer
    length: 7
    from: 93
    to: 99
    description: Samlet utbetalt kvalifiseringsstønad i løpet av 2024
    codeList:
      - code: 1
        description: Ja

  - name: STATUS
    dataType: String
    length: 1
    from: 100
    to: 100
    description: Hva er status for deltakelsen i kvalifiseringsprogrammet per kvartal?
    codeList:
      - code: 1
        description: Deltakeren er fortsatt i program (skjema er ferdig utfylt)
      - code: 2
        description: Deltakeren er i permisjon fra program (skjemaet er ferdig utfylt)
      - code: 3
        description: Deltakeren har fullført program eller avsluttet program etter avtale (gjelder ikke flytting)
      - code: 4
        description: Deltakerens program er varig avbrutt på grunn av uteblivelse (gjelder ikke flytting)
      - code: 5
        description: Deltakerens program ble avbrutt på grunn av flytting til annen kommune
      - code: 6
        description: Kun for Oslos bydeler. Deltakeren flyttet til annen bydel før programperioden var over
      - code: 7
        description: Deltakerens program er avsluttet etter avbrudd
    mandatory: true

  - name: AVSL_DATO
    dataType: DATE
    datePattern: DDMMYY
    length: 6
    from: 101
    to: 106
    description: Hvilken dato avsluttet deltakeren programmet? (gjelder ikke for permisjoner) (DDMMÅÅ)

  - name: AVSL_ORDINAERTARB
