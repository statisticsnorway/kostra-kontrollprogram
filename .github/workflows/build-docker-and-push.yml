name: Build Docker and push

on:
  push:
    tags:
      - '*'

env:
  REGISTRY: ghcr.io
  IMAGE: ${{ github.repository }}

jobs:
  build_and_push_docker:
    permissions:
      contents: read
      packages: write

    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Set docker image env var
        run: |
          echo "DOCKER_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ github.ref_name }}" >> $GITHUB_ENV

      - name: Set up QEMU # v3.7.0
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx # v3.11.3
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c

      - name: Set up JDK 25
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle # v5.0.0
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92

      - name: Build with Gradle
        run: ./gradlew build -p web --no-daemon --build-cache --info

      - name: 'Login to GitHub Container Registry' # v3.6.0
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker images # v6.18.0
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: ./web
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: |
            ${{ env.DOCKER_IMAGE }}
