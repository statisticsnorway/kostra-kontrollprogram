apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  labels:
    team: dftjen
  name: dev-kontrollprogram
  namespace: dftjen
spec:
  # application settings
  accessPolicy:
    outbound:
      external:
        - host: auth.test.ssb.no
  env:
    - name: MICRONAUT_ENVIRONMENTS
      value: nais-dev
  envFrom:
    - secret: login-config-dev-kontrollprogram
  ingresses:
    - https://dev-kontrollprogram.intern.test.ssb.no
  login:
    enforce:
      enabled: true
    provider: openid
  port: 8080
  replicas:
    max: 1
    min: 1
  resources:
    requests:
      cpu: 50m
      memory: 160Mi
