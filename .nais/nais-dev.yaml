apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  labels:
    team: dftjen
  name: dev-kontrollprogram-{{pr}}
  namespace: dftjen
spec:
  # application settings
  env:
    - name: MICRONAUT_ENVIRONMENTS
      value: nais-dev
  port: 8080
  replicas:
    max: 1
    min: 1
  resources:
    requests:
      cpu: 50m
      memory: 160Mi
  ttl: 5h
