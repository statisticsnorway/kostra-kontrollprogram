name: Build and deploy PR

on:
  pull_request:

jobs:
  detect-changes:
    name: Detect apps changed in PR
    runs-on: ubuntu-24.04
    outputs:
      changed: ${{ steps.detect.outputs.has_changes }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Detect changed apps across whole PR
        id: detect
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          echo "Base SHA: $BASE"
          echo "Head SHA: $HEAD"

          # Detect backend changes
          controls_changed=$(git diff --name-only "$BASE" "$HEAD" | grep "^kontroller/" | wc -l)
          api_changed=$(git diff --name-only "$BASE" "$HEAD" | grep "^web/" | wc -l)
          frontend_changed=$(git diff --name-only "$BASE" "$HEAD" | grep "^web-frontend/" | wc -l)

          # Convert to booleans
          controls_flag=$([ "controls_changed" -gt 0 ] && echo "true" || echo "false")
          api_flag=$([ "api_changed" -gt 0 ] && echo "true" || echo "false")
          frontend_flag=$([ "$frontend_changed" -gt 0 ] && echo "true" || echo "false")

          # Determine if anything changed
          if [ "$rest_flag" = "true" ] || [ "$gateway_flag" = "true" ] || [ "$frontend_flag" = "true" ]; then
            any_flag="true"
          else
            any_flag="false"
          fi

          echo "has_changes=$any_flag" >> $GITHUB_OUTPUT

          echo "Detected:"
          echo "  controls: $controls_flag"
          echo "  api     : $api_flag"
          echo "  frontend: $frontend_flag"
          echo "  has_changes: $any_flag"

  build-and-deploy:
    name: Build and deploy
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository at PR head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@f2beeb24e141e01a676f977032f5a29d81c9e27e
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up caching for Gradle and Maven
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.m2/repository
          key: gradle-pr-${{ github.event.pull_request.number }}-${{ hashFiles('**/*.gradle*', '**/gradle/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-pr-${{ github.event.pull_request.number }}-${{ hashFiles('**/*.gradle*', '**/gradle/libs.versions.toml', '**/gradle-wrapper.properties') }}
            gradle-pr-${{ github.event.pull_request.number }}-
            gradle-main-

      - name: Build with Gradle
        run: ./gradlew build -p web --configuration-cache --parallel --build-cache --warn

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093
        with:
          token_format: access_token
          workload_identity_provider: "projects/${{ secrets.GAR_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/gh-actions/providers/gh-actions"
          service_account: "gh-actions-kostra@${{ secrets.GAR_PROJECT_ID }}.iam.gserviceaccount.com"

      - name: Login to Artifact Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: europe-north1-docker.pkg.dev/${{ secrets.NAIS_MANAGEMENT_PROJECT_ID }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build Docker image
        id: docker-build
        uses: nais/docker-build-push@751a312f0803eb96a05a41fadf51be19b7be362c
        with:
          team: kostra
          docker_context: ./web
          pull: false
          tag: ${{ github.sha }}

      - name: Deploy PR to Dev
        uses: nais/deploy/actions/deploy@a7f8690f9b367fcbf5348a0a1e21d44f1aae50eb
        env:
          CLUSTER: test
          RESOURCE: .nais/nais-dev.yaml
          NAMESPACE: kostra
          WORKLOAD_IMAGE: ${{ steps.docker-build.outputs.image }}
          TELEMETRY: ${{ steps.docker-build.outputs.telemetry }}
          DEPLOY_SERVER: deploy.ssb.cloud.nais.io:443
          VAR: pr=${{github.event.pull_request.number}}

      - name: Deployment Summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **SHA**: ${{ inputs.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: \`${{ environment }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: [View deployment](https://dev-kontrollprogram-${{github.event.pull_request.number}}.intern.test.ssb.no)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
