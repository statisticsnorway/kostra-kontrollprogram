name: Build and deploy PR

on:
  pull_request:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository at PR head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Set up PR caching for Gradle and Maven
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.m2/repository
          key: gradle-pr-${{ github.event.pull_request.number }}-${{ hashFiles('**/*.gradle*', '**/gradle/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-pr-${{ github.event.pull_request.number }}-
            gradle-main-

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093
        with:
          token_format: access_token
          workload_identity_provider: "projects/${{ secrets.GAR_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/gh-actions/providers/gh-actions"
          service_account: "gh-actions-dftjen@${{ secrets.GAR_PROJECT_ID }}.iam.gserviceaccount.com"

      - name: Login to Artifact Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0
        with:
          registry: europe-north1-docker.pkg.dev/${{ secrets.NAIS_MANAGEMENT_PROJECT_ID }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build with Gradle
        run: ./gradlew build --configuration-cache --parallel --build-cache --warn

      - name: Kostra Kontrollprogram Web - Build Docker image
        id: docker-build-web
        uses: nais/docker-build-push@31c3a7321909bcb20799fdf46153fec721fd9512
        with:
          team: dftjen
          docker_context: ./web
          pull: false
          image_suffix: "web"
          tag: |
            dev-${{ github.sha }}
            dev-latest

      - name: Kostra Kontrollprogram Web - Deploy to Dev
        uses: nais/deploy/actions/deploy@a7f8690f9b367fcbf5348a0a1e21d44f1aae50eb
        env:
          CLUSTER: test
          RESOURCE: .nais/web-dev.yaml
          NAMESPACE: dftjen
          WORKLOAD_IMAGE: ${{ steps.docker-build-web.outputs.image }}
          TELEMETRY: ${{ steps.docker-build-web.outputs.telemetry }}
          DEPLOY_SERVER: deploy.ssb.cloud.nais.io:443

      - name: Kostra Kontrollprogram Altinn API - Build Docker image
        id: docker-build-altinn-api
        uses: nais/docker-build-push@31c3a7321909bcb20799fdf46153fec721fd9512
        with:
          team: dftjen
          docker_context: ./altinn-api
          pull: false
          image_suffix: "altinn-api"
          tag: |
            dev-${{ github.sha }}
            dev-latest

      - name: Kostra Kontrollprogram Altinn API - Deploy to Dev
        uses: nais/deploy/actions/deploy@a7f8690f9b367fcbf5348a0a1e21d44f1aae50eb
        env:
          CLUSTER: test
          RESOURCE: .nais/altinn-api-dev.yaml
          NAMESPACE: dftjen
          WORKLOAD_IMAGE: ${{ steps.docker-build-altinn-api.outputs.image }}
          TELEMETRY: ${{ steps.docker-build-altinn-api.outputs.telemetry }}
          DEPLOY_SERVER: deploy.ssb.cloud.nais.io:443


      - name: Deployment Summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **SHA**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: [View Kostra Kontrollprogram](https://dev-kostra-kontrollprogram.intern.test.ssb.no)" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: [View Altinn API](https://dev-kostra-altinn-api.intern.test.ssb.no)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
